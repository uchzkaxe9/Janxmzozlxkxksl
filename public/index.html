<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-text {
            background: linear-gradient(to right, #60A5FA, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Animated Background -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
    </div>

    <!-- Login Card -->
    <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md z-10 transform transition-all hover:scale-[1.01]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white tracking-tight">Nexus <span class="gradient-text">Dash</span></h1>
            <p class="text-gray-400 text-sm mt-2">Premium Camera Tracking Suite</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-gray-300 text-sm font-semibold mb-2">Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com" 
                    class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95">
                Get Started Free
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-500">Secure 256-bit SSL Encrypted</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            // Simulate API Call
            const res = await fetch('/api/generate-link', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            const data = await res.json();
            
            if(data.success) {
                // Store in local storage for the dashboard to read
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userId', data.userId);
                window.location.href = '/dashboard.html';
            }
        });
    </script>
</body>
</html>
